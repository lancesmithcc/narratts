services:
  narratts:
    build: .
    env_file: .env
    environment:
      TTS_HOST: 0.0.0.0
      TTS_DATA_DIR: /data
      HF_HOME: /models/huggingface
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - narratts-data:/data
      - huggingface-cache:/models/huggingface
    restart: unless-stopped

volumes:
  narratts-data:
  huggingface-cache:
