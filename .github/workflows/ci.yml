name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pydantic pytest python-dotenv soundfile
      - name: Check secrets and local artifacts are not tracked
        run: |
          test -z "$(git ls-files '.env' '*.pem' '*.key' 'voices/**' 'service_outputs/**')"
      - name: Test
        run: pytest
      - name: Compile
        run: python -m compileall -q service qwen3_tts.py
      - name: Build distribution
        run: python -m build
